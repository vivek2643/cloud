# One large GPU box: run the whole worker fleet (gpu ingest + cpu render) in a
# single container via run_workers.sh. See docs/gpu_worker.md.
#
#   GPU_WORKERS=4 CPU_WORKERS=2 docker compose -f deploy/aws/docker-compose.yml up -d
#
# Place the real secrets in a .env at the repo root (gitignored).
services:
  worker-fleet:
    image: ghcr.io/vivek2643/cloud-worker:latest
    pull_policy: always
    env_file:
      - ../../.env
    environment:
      GPU_WORKERS: ${GPU_WORKERS:-}     # default: detected GPU count
      CPU_WORKERS: ${CPU_WORKERS:-2}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
    command: ["bash", "run_workers.sh"]
    restart: unless-stopped
    # Persist downloaded model weights (~7 GB) across restarts.
    volumes:
      - models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  models:
