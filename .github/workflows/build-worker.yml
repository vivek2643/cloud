name: Build GPU worker image

# Builds backend/Dockerfile.worker and pushes it to GitHub Container Registry
# (GHCR) so RunPod / Lambda / any GPU host can pull it. No local Docker needed.
on:
  workflow_dispatch: {}
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - ".github/workflows/build-worker.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The CUDA base image is large; reclaim runner disk before building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.worker
          push: true
          tags: ghcr.io/${{ github.repository }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
